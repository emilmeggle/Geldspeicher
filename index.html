<style>
  :root {
    --night:    #16241E;
    --night-2:  #0B120F;
    --fir-far:  #2E4A3A;
    --fir-mid:  #1F3829;
    --fir-near: #112018;
    --num:      #F5EDD8;
    --num-soft: rgba(245,237,216,0.72);
    --muted:    rgba(245,237,216,0.44);
    --accent:   #F7931A;
    --glow:     rgba(247,147,26,0.26);
    --serif: "Newsreader", Georgia, "Times New Roman", serif;
    --sans: "Hanken Grotesk", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --s: 0.6; /* device scale — refined by JS */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    min-height: 100svh;
    background: var(--night-2);
    color: var(--num);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  /* ── Black Forest clearing ───────────────────────────────────── */
  .forest { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
  .forest__sky { position: absolute; inset: 0; background: radial-gradient(130% 90% at 50% -8%, #2A4034 0%, #18271F 46%, #0B120F 100%); }
  .forest__glow { position: absolute; inset: 0; background: radial-gradient(40% 44% at 50% 52%, var(--glow) 0%, transparent 62%), radial-gradient(64% 52% at 50% 18%, rgba(150,190,200,0.06) 0%, transparent 60%); }
  .forest__firs { position: absolute; inset: 0; width: 100%; height: 100%; }
  .mist { position: absolute; left: -5%; width: 110%; height: 190px; background: radial-gradient(60% 100% at 50% 50%, rgba(190,212,205,0.07), transparent 72%); filter: blur(6px); pointer-events: none; }
  .mist--1 { bottom: 30%; } .mist--2 { bottom: 6%; opacity: 0.7; }
  .vignette { position: absolute; inset: 0; pointer-events: none; background: radial-gradient(125% 105% at 50% 46%, transparent 56%, rgba(4,9,7,0.6) 100%); }
  .grain { position: absolute; inset: 0; pointer-events: none; opacity: 0.4; mix-blend-mode: overlay; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.45'/></svg>"); }
  .motes { position: absolute; inset: 0; pointer-events: none; }
  .mote { position: absolute; width: 3px; height: 3px; border-radius: 999px; background: var(--accent); box-shadow: 0 0 7px 2px rgba(247,147,26,0.5); opacity: 0; animation: drift linear infinite; }
  @keyframes drift { 0% { transform: translate(0,0) scale(0.7); opacity: 0; } 12% { opacity: 0.85; } 80% { opacity: 0.5; } 100% { transform: translate(var(--mx, 16px), -140px) scale(1); opacity: 0; } }

  /* ── Top bar — design-studie left, links right ───────────────── */
  .top {
    position: fixed; top: 0; left: 0; right: 0; z-index: 6;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px clamp(16px, 4vw, 44px); gap: 14px;
  }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 9px;
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--muted); white-space: nowrap;
  }
  .eyebrow::before { content: ""; width: 7px; height: 7px; border-radius: 999px; background: var(--accent); box-shadow: 0 0 9px 1px var(--accent); }
  .top__links { display: flex; align-items: center; gap: 20px; }
  .top__links a { color: var(--num-soft); text-decoration: none; font-size: 0.86rem; font-weight: 600; transition: color 0.18s; white-space: nowrap; }
  .top__links a:hover { color: var(--num); }

  /* ── Stage ───────────────────────────────────────────────────── */
  /* Desktop: the title (top) and the unit buttons (filling the space below) share ONE left column,
     so both sit at the same distance from the tall phone on the right. */
  .stage {
    position: relative; z-index: 2; min-height: 100svh;
    display: grid;
    grid-template-columns: auto auto;
    grid-template-areas: "left phone";
    align-items: stretch; align-content: center; justify-content: center;
    column-gap: clamp(20px, 3vw, 48px);
    row-gap: clamp(16px, 2.6vh, 32px);
    padding: clamp(40px, 7.5vh, 92px) clamp(20px, 3.4vw, 56px);
    text-align: left;
  }
  /* left column — stretches to the phone's height; title pinned top, buttons fill the rest. */
  .left { grid-area: left; display: flex; flex-direction: column; align-items: flex-start; min-width: 0; }
  .intro { width: 100%; max-width: 360px; margin-bottom: clamp(20px, 4vh, 52px); }
  .device-wrap { grid-area: phone; align-self: center; justify-self: center; }
  .headline {
    font-family: var(--serif); font-weight: 500;
    font-size: clamp(2.05rem, 4.8vw, 3.2rem); line-height: 1.04; letter-spacing: -0.012em;
    color: var(--num); text-shadow: 0 2px 30px rgba(0,0,0,0.4);
  }
  .headline em { font-style: normal; color: var(--accent); }
  .lede {
    max-width: 62ch; margin: 9px 0 0;
    font-size: clamp(0.86rem, 1vw, 0.99rem); line-height: 1.5; color: var(--num-soft); font-weight: 400;
  }

  /* device — iPhone body wrapping the live screen */
  .device-wrap { position: relative; z-index: 2; width: calc(419px * var(--s)); height: calc(878px * var(--s)); }

  /* ── Breakout vault door (page layer, over the phone) ───────────
     Mirrors the in-iframe door exactly; JS sets .bd-wrap left/top/width/height/perspective. */
  .bd-wrap { position: absolute; z-index: 3; opacity: 0; transition: opacity 0.25s ease; pointer-events: none; }
  .bd-wrap.is-placed { opacity: 1; }
  .breakout-door {
    position: absolute; inset: 0; transform-style: preserve-3d;
    transform-origin: 15.79% 41.18%;            /* = 53.67px / 140px on the 340px door */
    transform: rotateY(0deg);
    transition: transform 460ms cubic-bezier(.22,.9,.28,1);
  }
  .device-wrap.door-open .breakout-door { transform: rotateY(-180deg); transition-delay: 300ms; }
  .bd-face { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; backface-visibility: hidden; -webkit-backface-visibility: hidden; }
  .bd-face--back { transform: rotateY(180deg); }
  /* choreography copied from bank.css (scoped) so the swing keeps its wheel-spin + bolt-slide */
  .breakout-door .vault-wheel { transform-box: view-box; transform-origin: 120px 120px; }
  .device-wrap.door-open .breakout-door .vault-wheel { animation: bdWheelOpen 220ms cubic-bezier(.16,.92,.22,1) both; }
  @keyframes bdWheelOpen { from { transform: rotate(0deg); } to { transform: rotate(1440deg); } }
  .breakout-door .vault-bolt { transform-box: view-box; transition: none; }
  .device-wrap.door-open .breakout-door .vault-bolt { transition: transform 150ms cubic-bezier(.2,.8,.2,1) 170ms; }
  .device-wrap.door-open .breakout-door .vault-bolt--top { transform: translateY(15px); }
  .device-wrap.door-open .breakout-door .vault-bolt--bottom { transform: translateY(-15px); }
  .device-wrap.door-open .breakout-door .vault-bolt--left { transform: translateX(15px); }
  .device-wrap.door-open .breakout-door .vault-bolt--right { transform: translateX(-15px); }
  .breakout-door .vault-door-rim { transition: stroke-width 460ms cubic-bezier(.22,.9,.28,1); }
  .device-wrap.door-open .breakout-door .vault-door-rim { stroke-width: 6; }
  @media (prefers-reduced-motion: reduce) { .breakout-door, .device-wrap.door-open .breakout-door .vault-wheel { transition-duration: 0.01ms; animation-duration: 0.01ms; } }

  .device {
    position: absolute; top: 0; left: 0; width: 419px; height: 878px;
    transform: scale(var(--s)); transform-origin: top left;
    padding: 13px; border-radius: 60px;
    background: linear-gradient(150deg, #34373C 0%, #1E2125 38%, #131518 72%, #2A2D32 100%);
    box-shadow: inset 0 0 0 1.5px rgba(255,255,255,0.12), inset 0 0 0 7px rgba(0,0,0,0.4), 0 36px 70px -18px rgba(0,0,0,0.82), 0 12px 26px rgba(0,0,0,0.55);
  }
  .device__screen { width: 393px; height: 852px; border: 0; display: block; background: transparent; border-radius: 48px; position: relative; z-index: 1; }
  .device__btn { position: absolute; z-index: 0; background: linear-gradient(90deg, #34373C, #15171A); }
  .device__btn--mute  { left: -3px; top: 156px; width: 4px; height: 26px; border-radius: 3px 0 0 3px; }
  .device__btn--vup   { left: -4px; top: 202px; width: 5px; height: 54px; border-radius: 3px 0 0 3px; }
  .device__btn--vdown { left: -4px; top: 270px; width: 5px; height: 54px; border-radius: 3px 0 0 3px; }
  .device__btn--power { right: -4px; top: 224px; width: 5px; height: 80px; border-radius: 0 3px 3px 0; background: linear-gradient(270deg, #34373C, #15171A); }
  .floor { position: absolute; left: 50%; bottom: 0%; transform: translateX(-50%); width: 60%; height: 26px; z-index: 1; background: radial-gradient(ellipse at center, rgba(0,0,0,0.72) 0%, transparent 72%); filter: blur(12px); }

  /* ── Unit-adder buttons — one grouped "control deck" under the title ──
     Wrapped in a single faint panel and packed tight so they read as one object,
     not eight pills floating on the background. Centred vertically against the phone. */
  .units { display: flex; flex-direction: column; gap: 5px; position: relative;
    align-self: center; margin: auto 0; max-width: 340px; width: 100%;
    background: rgba(245,237,216,0.035);
    border: 1px solid rgba(245,237,216,0.10);
    border-radius: 22px; padding: 12px;
    box-shadow: inset 0 1px 0 rgba(245,237,216,0.05), 0 22px 48px -28px rgba(0,0,0,0.75); }
  .unit {
    font-family: var(--sans); font-weight: 600; font-size: 0.94rem;
    color: var(--num-soft); background: transparent;
    border: 1px solid transparent; border-radius: 13px;
    padding: 9px 14px 9px 10px; cursor: pointer; white-space: nowrap;
    display: flex; align-items: center; gap: 11px; width: 100%; min-width: 188px;
    transition: color 0.16s, background 0.16s, transform 0.1s, border-color 0.16s;
  }
  .unit:hover { color: var(--num); background: rgba(245,237,216,0.08); transform: translateX(-2px); }
  .unit:active { transform: translateX(1px); }
  .unit__glyph { width: 27px; height: 27px; flex: none; display: block; }
  .unit__emoji { width: 27px; flex: none; text-align: center; font-size: 19px; line-height: 1; }
  .unit__name { flex: 1; text-align: left; }
  .unit__add { color: var(--muted); font-weight: 600; }
  .unit:hover .unit__add { color: var(--num-soft); }
  .unit.flash { animation: unitflash 0.45s ease; }
  @keyframes unitflash { 0%,100%{ background: transparent;} 35%{ background: rgba(247,147,26,0.22); border-color: var(--accent);} }

  /* Zufällig — the "show me" button at the top, brighter so it invites the first click. */
  .unit--random {
    background: rgba(245,237,216,0.16); border-color: rgba(245,237,216,0.3);
    color: var(--num); font-weight: 700; margin-bottom: 7px;
  }
  .unit--random:hover { background: rgba(245,237,216,0.23); }
  /* Leeren — clear action, dim-red (not greyed out). */
  .unit--reset {
    background: rgba(206,74,58,0.13); border-color: rgba(214,92,72,0.34);
    color: #E4A99C; margin-top: 7px;
  }
  .unit--reset:hover { background: rgba(206,74,58,0.21); color: #F2C5BA; }

  /* Pointing finger — invites the first tap on "add Taler", poking up-left in a calm
     two-jab-then-rest rhythm (positioned centred on the row; see the rule below).
     Cream silhouette + soft shadow reads on the near-black page; the single orange cuff is its only
     accent. JS removes it on the first unit tap. */
  .unit[data-add="taler"] { position: relative; overflow: visible; }
  /* Centred on the Taler row — both axes (left/top 50% + translate(-50%,-50%)), so the finger sits
     in the middle of the button it advertises. That centring offset is baked into the poke keyframes
     so there's no jump when the loop starts. */
  .tap-finger {
    position: absolute; z-index: 6; left: 50%; top: calc(50% + 14px); width: 56px; height: 56px;
    transform: translate(-50%, -50%);
    pointer-events: none;                 /* never swallows the tap it advertises */
    opacity: 0;
    filter: drop-shadow(0 5px 9px rgba(0,0,0,0.55));
    animation: tapFingerIn 0.45s ease-out 1s forwards,
               tapPoke 1.9s cubic-bezier(.34,.16,.2,1) 1.5s infinite;
  }
  @keyframes tapFingerIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes tapPoke {
    0%   { transform: translate(-50%, -50%) translate(0, 0); }
    14%  { transform: translate(-50%, -50%) translate(-5px, -5px); }  /* first poke up-left */
    26%  { transform: translate(-50%, -50%) translate(0, 0); }
    40%  { transform: translate(-50%, -50%) translate(-5px, -5px); }  /* second poke */
    52%, 100% { transform: translate(-50%, -50%) translate(0, 0); }   /* rest before the loop repeats */
  }
  @media (prefers-reduced-motion: reduce) { .tap-finger { animation: none; opacity: 1; } }

  /* Mobile/tablet (<860px): stack — text on top, rail beside the phone below. */
  @media (max-width: 860px) {
    .stage {
      grid-template-columns: auto 1fr;
      grid-template-rows: auto auto;
      grid-template-areas: "intro intro" "rail phone";
      align-items: start;
      column-gap: clamp(8px, 2vw, 18px);
      row-gap: clamp(12px, 2.4vh, 26px);
      padding: clamp(40px, 5vh, 60px) clamp(14px, 4vw, 40px) clamp(16px, 3vh, 30px);
    }
    /* unwrap the left column so the title spans the top and the buttons sit beside the phone */
    .left { display: contents; }
    .intro { grid-area: intro; max-width: none; width: auto; margin-bottom: 0; }
    /* The grouped panel sits beside the phone, packed and top-aligned (content height). */
    .units { grid-area: rail; align-self: start; margin: 0; max-width: none; padding: 8px; }
    .device-wrap { align-self: start; }
    .tap-finger { display: none; } /* rail sits beside the phone here — no gutter for the hint */
  }
  @media (max-width: 760px) {
    .unit { min-width: 0; font-size: 0.8rem; padding: 7px 11px 7px 8px; gap: 7px; border-radius: 11px; }
    .unit__glyph { width: 22px; height: 22px; }
    .unit__emoji { width: 22px; font-size: 15px; }
  }

  /* ── load reveal ─────────────────────────────────────────────── */
  .reveal { opacity: 0; transform: translateY(14px); animation: rise 1s cubic-bezier(.2,.7,.2,1) forwards; }
  .d1 { animation-delay: 0.06s; } .d2 { animation-delay: 0.18s; } .d3 { animation-delay: 0.32s; } .d4 { animation-delay: 0.5s; }
  @keyframes rise { to { opacity: 1; transform: none; } }
  .device-wrap.reveal { animation: rise-dev 1.2s cubic-bezier(.2,.7,.2,1) forwards; animation-delay: 0.42s; }
  @keyframes rise-dev { from { opacity: 0; transform: translateY(26px) scale(0.985); } to { opacity: 1; transform: none; } }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
    .reveal, .device-wrap.reveal { opacity: 1; transform: none; }
    .mote { display: none; }
  }
</style>
</head>
<body>
  <!-- The vault ₿ glyph (OFFICIAL_B_PATH from bank.js) — one source for headline + unit chips. -->
  <svg width="0" height="0" aria-hidden="true" style="position:absolute"><symbol id="bb" viewBox="0 0 16 16"><path d="M5.5 13v1.25c0 .138.112.25.25.25h1a.25.25 0 0 0 .25-.25V13h.5v1.25c0 .138.112.25.25.25h1a.25.25 0 0 0 .25-.25V13h.084c1.992 0 3.416-1.033 3.416-2.82 0-1.502-1.007-2.323-2.186-2.44v-.088c.97-.242 1.683-.974 1.683-2.19C11.997 3.93 10.847 3 9.092 3H9V1.75a.25.25 0 0 0-.25-.25h-1a.25.25 0 0 0-.25.25V3h-.573V1.75a.25.25 0 0 0-.25-.25H5.75a.25.25 0 0 0-.25.25V3l-1.998.011a.25.25 0 0 0-.25.25v.989c0 .137.11.25.248.25l.755-.005a.75.75 0 0 1 .745.75v5.505a.75.75 0 0 1-.75.75l-.748.011a.25.25 0 0 0-.25.25v1c0 .138.112.25.25.25L5.5 13zm1.427-8.513h1.719c.906 0 1.438.498 1.438 1.312 0 .871-.575 1.362-1.877 1.362h-1.28V4.487zm0 4.051h1.84c1.137 0 1.756.58 1.756 1.524 0 .953-.626 1.45-1.847 1.45H6.927V8.539z"/></symbol></svg>

  <div class="forest" aria-hidden="true">
    <div class="forest__sky"></div>
    <div class="forest__glow"></div>
    <svg class="forest__firs" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMax slice">
      <symbol id="fir" viewBox="0 0 120 240">
        <path d="M60 6 L72 52 L65 52 L80 96 L71 96 L88 140 L77 140 L96 186 L70 186 L70 234 L50 234 L50 186 L24 186 L43 140 L32 140 L49 96 L40 96 L55 52 L48 52 Z"/>
      </symbol>
      <g fill="var(--fir-far)" opacity="0.5">
        <use href="#fir" x="40" y="560" width="92" height="184"/>
        <use href="#fir" x="150" y="588" width="78" height="156"/>
        <use href="#fir" x="250" y="566" width="86" height="172"/>
        <use href="#fir" x="360" y="596" width="72" height="144"/>
        <use href="#fir" x="980" y="592" width="74" height="148"/>
        <use href="#fir" x="1080" y="566" width="88" height="176"/>
        <use href="#fir" x="1196" y="588" width="78" height="156"/>
        <use href="#fir" x="1300" y="560" width="94" height="188"/>
      </g>
      <g fill="var(--fir-mid)" opacity="0.92">
        <use href="#fir" x="-20" y="540" width="150" height="320"/>
        <use href="#fir" x="120" y="600" width="120" height="300"/>
        <use href="#fir" x="1230" y="600" width="120" height="300"/>
        <use href="#fir" x="1340" y="540" width="150" height="320"/>
      </g>
      <g fill="var(--fir-near)">
        <use href="#fir" x="-60" y="470" width="210" height="470"/>
        <use href="#fir" x="60" y="600" width="150" height="360"/>
        <use href="#fir" x="1290" y="470" width="210" height="470"/>
        <use href="#fir" x="1230" y="600" width="150" height="360"/>
      </g>
    </svg>
    <div class="mist mist--1"></div>
    <div class="mist mist--2"></div>
    <div class="motes" id="motes"></div>
    <div class="vignette"></div>
    <div class="grain"></div>
  </div>

  <header class="top">
    <p class="eyebrow reveal d1">Concept Design</p>
    <nav class="top__links reveal d1">
      <a id="ghLink" href="https://github.com/emilmeggle" target="_blank" rel="noopener noreferrer">GitHub ↗</a>
      <a id="folioLink" href="https://emilmeggle.me" target="_blank" rel="noopener noreferrer">Portfolio ↗</a>
    </nav>
  </header>

  <main class="stage">
    <div class="left">
    <div class="intro">
      <h1 class="headline reveal d1">Bitcoin.<br><em>Zum&nbsp;Anfassen.</em></h1>
      <p class="lede reveal d2">
        Dieses Wallet-Design wurde entworfen um Bitcoin greifbarer zu machen.
        Kein Chart, sondern ein Geldspeicher, der sich füllt.
      </p>
    </div>

    <div class="units reveal d3" role="group" aria-label="Einheit hinzufügen">
      <button class="unit unit--random" data-add="zufaellig" aria-label="Zufälligen Mix in den Speicher legen">
        <span class="unit__emoji" aria-hidden="true">🔀</span>
        <span class="unit__name">Zufällig</span>
      </button>
      <button class="unit" data-add="black" aria-label="Black Bitcoin hinzufügen">
        <svg class="unit__glyph" viewBox="0 0 28 28" aria-hidden="true"><circle cx="14" cy="14" r="10.6" fill="#2A2F38" stroke="#05070A" stroke-width="1.5"/><use href="#bb" x="6.6" y="6.6" width="14.8" height="14.8" fill="#F5EDD8"/></svg>
        <span class="unit__name"><span class="unit__add">add</span> Black&nbsp;Bitcoin</span>
      </button>
      <button class="unit" data-add="btc" aria-label="Bitcoin hinzufügen">

        <span class="unit__name"><span class="unit__add">add</span> Taler</span>
        <!-- Tap hint: a hand-drawn pointing finger that pokes up-left at this row to invite the first
             tap. Cream so it reads on the dark page; lone orange cuff (orange stays reserved). Removed
             on the first unit tap by JS. -->
        <svg class="tap-finger" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
          <g transform="rotate(-18 33 33)" stroke="#1A2028" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
            <path fill="#F5EDD8" d="M21.2 14.3 C18.6 11.4 22.4 7.6 25.6 9.9 L40.5 23.0 C41.6 22.1 43.0 21.6 44.4 21.8 C46.9 22.1 48.2 24.3 47.6 26.4 C49.6 26.6 51.0 28.2 50.7 30.2 C52.5 30.8 53.4 32.7 52.6 34.6 C53.9 35.6 54.2 37.6 53.0 39.1 L48.6 49.3 C46.4 54.4 41.2 57.6 35.7 56.7 L31.4 56.0 C27.6 55.4 24.2 53.3 22.0 50.1 L13.6 38.0 C11.8 35.3 12.5 31.6 15.2 29.7 C17.6 28.0 20.9 28.4 22.9 30.5 L24.4 32.1 Z"/>
            <path d="M44.3 22.0 C45.6 26.8 45.4 31.0 44.6 34.6"/>
            <path d="M47.4 26.6 C48.6 30.5 48.4 34.0 47.6 37.4"/>
            <path d="M50.4 30.4 C51.4 33.5 51.2 36.3 50.5 39.1"/>
            <path fill="#F7931A" d="M22.0 50.1 C24.2 53.3 27.6 55.4 31.4 56.0 L29.0 60.4 C28.2 61.8 26.5 62.3 25.1 61.5 L16.6 56.7 C15.2 55.9 14.7 54.1 15.5 52.7 L17.6 49.0 C19.0 49.7 20.5 50.0 22.0 50.1 Z"/>
          </g>

      <button class="unit" data-add="sat" aria-label="Satoshi hinzufügen">
        <svg class="unit__glyph" viewBox="0 0 28 28" aria-hidden="true"><circle cx="14" cy="14" r="7.6" fill="#F5EDD8" stroke="#A86512" stroke-width="1.4"/><use href="#bb" x="8.5" y="8.5" width="11" height="11" fill="#1A2028"/></svg>
        <span class="unit__name"><span class="unit__add">add</span> Satoshi</span>

      <button class="unit unit--reset" data-add="reset" aria-label="Speicher leeren">

    </div>
    </div>

    <div class="device-wrap reveal">
        <div class="floor"></div>
        <div class="device">
          <span class="device__btn device__btn--mute"></span>
          <span class="device__btn device__btn--vup"></span>
          <span class="device__btn device__btn--vdown"></span>
          <span class="device__btn device__btn--power"></span>
          <iframe id="phone" class="device__screen" title="Geldspeicher — Live-Vorschau" src="design/preview.html?embed" scrolling="no" loading="eager"></iframe>
        </div>
        <!-- Breakout door: a pixel-exact copy of the in-iframe vault door, rendered in the page
             layer (over the phone) so it can swing out past the frame. Positioned/sized by JS to
             overlay the real vault; the in-iframe door is hidden in embed so there is no double. -->
        <div class="bd-wrap" aria-hidden="true">
          <div class="breakout-door">
            <svg class="bd-face bd-face--front" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
              <g class="vault-door">
                <circle class="vault-door-rim" cx="120" cy="120" r="74" fill="#3A4452" stroke="#1A2028" stroke-width="3"/>
                <circle cx="120" cy="120" r="68" fill="#5E6973" stroke="#1A2028" stroke-width="2"/>
                <g class="vault-bolts" stroke="#1A2028" stroke-width="7" stroke-linecap="round">
                  <line class="vault-bolt vault-bolt--top" x1="120" y1="78" x2="120" y2="103"/>
                  <line class="vault-bolt vault-bolt--bottom" x1="120" y1="137" x2="120" y2="162"/>
                  <line class="vault-bolt vault-bolt--left" x1="78" y1="120" x2="103" y2="120"/>
                  <line class="vault-bolt vault-bolt--right" x1="137" y1="120" x2="162" y2="120"/>
                </g>
                <g class="vault-bolt-caps" fill="#1A2028">
                  <circle cx="120" cy="78" r="6"/><circle cx="120" cy="162" r="6"/>
                  <circle cx="78" cy="120" r="6"/><circle cx="162" cy="120" r="6"/>
                </g>
                <g class="vault-wheel">
                  <circle cx="120" cy="120" r="20" fill="#8E99A4" stroke="#1A2028" stroke-width="3"/>
                  <circle cx="120" cy="120" r="6" fill="#1A2028"/>
                  <g stroke="#1A2028" stroke-width="3" stroke-linecap="round">
                    <line x1="120" y1="100" x2="120" y2="108"/><line x1="120" y1="132" x2="120" y2="140"/>
                    <line x1="100" y1="120" x2="108" y2="120"/><line x1="132" y1="120" x2="140" y2="120"/>
                  </g>
                </g>
                <path d="M 64 82 A 68 68 0 0 1 100 56" stroke="#D8E0E8" stroke-width="3" stroke-linecap="round" fill="none"/>
                <g stroke="#1A2028" stroke-width="1.2" opacity="0.45" stroke-linecap="round">
                  <line x1="135" y1="170" x2="160" y2="145"/><line x1="145" y1="180" x2="170" y2="155"/>
                  <line x1="155" y1="180" x2="180" y2="155"/><line x1="160" y1="190" x2="180" y2="170"/>
                </g>
              </g>
            </svg>
            <svg class="bd-face bd-face--back" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
              <g class="vault-door-inner">
                <circle cx="120" cy="120" r="74" fill="#3A4452" stroke="#1A2028" stroke-width="3"/>
                <circle cx="120" cy="120" r="68" fill="#5E6973" stroke="#1A2028" stroke-width="2"/>
                <path d="M 140 56 A 68 68 0 0 1 176 82" stroke="#D8E0E8" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.45"/>
              </g>
            </svg>
          </div>
        </div>
      </div>
  </main>

  <script>
    // ── Drive the live phone (same-origin) ──
    const frame = document.getElementById('phone');
    function pwin() { try { return frame.contentWindow; } catch (e) { return null; } }
    function call(fn, ...args) { const w = pwin(); if (w && typeof w[fn] === 'function') { try { w[fn](...args); } catch (e) {} } }

    // ── Breakout vault door: place the page-layer door exactly over the in-iframe vault,
    //    and mirror its open/closed state so it swings out past the phone frame. ──
    const bdWrap = document.querySelector('.bd-wrap');
    const deviceWrap = document.querySelector('.device-wrap');
    function placeDoor() {
      const w = pwin(); if (!w) return;
      // read the vault STAGE (same 340×340 box as the door, but not display:none-hidden)
      let stage; try { stage = w.document.querySelector('.vault-stage'); } catch (e) { return; }
      if (!stage) return;
      const dr = stage.getBoundingClientRect();           // iframe-content coords
      const ifr = frame.getBoundingClientRect();          // iframe's visual rect in the page
      const sc = ifr.width / (frame.clientWidth || 393);  // effective scale (= --s)
      const pr = deviceWrap.getBoundingClientRect();      // offset parent
      if (!(dr.width > 0) || !(sc > 0)) return;
      bdWrap.style.left = (ifr.left - pr.left + dr.left * sc) + 'px';
      bdWrap.style.top = (ifr.top - pr.top + dr.top * sc) + 'px';
      bdWrap.style.width = (dr.width * sc) + 'px';
      bdWrap.style.height = (dr.height * sc) + 'px';
      bdWrap.style.perspective = (600 * sc) + 'px';
      bdWrap.classList.add('is-placed');
    }
    // The breakout-past-the-frame door swings OUT of the phone and over the left-column add-money
    // buttons — a deliberate flourish (Emil 2026-06-16: "it's a cool effect"). It runs on every
    // viewport now; on mobile the buttons are shrunk so a slice still peeks past the swung door, and
    // .bd-wrap is pointer-events:none so the buttons stay tappable even where the door covers them.
    // Two doors, one illusion. The IN-IFRAME door (.vault-door-layer, shown via `.door-inline`)
    // is a child of the sliding room track, so it moves as one piece with the vault — it owns every
    // resting/closed state and every room slide. The BREAKOUT door (page-layer overlay) is a pixel
    // copy that can swing OUT past the phone frame over the add-money buttons — it owns only the
    // open swing while resting on Bank. We hand off between them at the closed position, where the
    // two are identical, so the swap is invisible. (Earlier the breakout owned everything, so on a
    // room slide it floated detached from the vault — "statically appears, not one piece".)
    let breakoutShown = false;     // is the breakout overlay the active door right now?
    let swapTimer = null;          // pending close-swing → in-iframe handoff
    function inIframeDoor(on) {     // on => show the in-iframe door (part of the vault)
      const w = pwin(); if (!w) return;
      let html; try { html = w.document.documentElement; } catch (e) { return; }
      if (html) html.classList.toggle('door-inline', on);
    }
    function toInIframeDoor() {     // breakout off, in-iframe door on (slides as one piece)
      if (swapTimer) { clearTimeout(swapTimer); swapTimer = null; }
      deviceWrap.classList.remove('door-open');
      bdWrap.style.visibility = 'hidden';
      inIframeDoor(true);
      breakoutShown = false;
    }
    function openBreakout() {       // hand off to the breakout and swing it out
      if (swapTimer) { clearTimeout(swapTimer); swapTimer = null; }
      placeDoor();                                 // align the overlay over the vault exactly
      bdWrap.style.visibility = '';
      deviceWrap.classList.remove('door-open');    // start flush on the vault…
      inIframeDoor(false);                         // …hide the in-iframe copy (no double door)
      void bdWrap.offsetWidth;                     // commit the closed baseline so the swing animates
      deviceWrap.classList.add('door-open');       // …then swing out
      breakoutShown = true;
    }
    function syncDoor() {
      const w = pwin(); if (!w) return;
      let phone; try { phone = w.document.querySelector('.phone'); } catch (e) { return; }
      const onBank = phone.getAttribute('data-room') === 'bank';
      const open   = phone.getAttribute('data-mode') === 'vault-open';
      if (onBank && open) {
        openBreakout();
      } else if (onBank && breakoutShown) {
        // Closing while staying on Bank: let the breakout swing shut, then hand the closed door
        // back to the in-iframe copy. Wait for transitionend (self-adapts to the swing time);
        // fall back to a timer in case the event is missed.
        deviceWrap.classList.remove('door-open');
        if (swapTimer) clearTimeout(swapTimer);
        const door = bdWrap.querySelector('.breakout-door');
        const finish = () => {
          door && door.removeEventListener('transitionend', onEnd);
          const p = (pwin() && pwin().document.querySelector('.phone'));
          if (p && p.getAttribute('data-room') === 'bank' && p.getAttribute('data-mode') !== 'vault-open') toInIframeDoor();
        };
        const onEnd = (e) => { if (e.propertyName === 'transform') finish(); };
        door && door.addEventListener('transitionend', onEnd);
        swapTimer = setTimeout(finish, 1000);
      } else {
        // Closed & resting, or any non-Bank room (incl. mid-slide): the in-iframe door is the door.
        toInIframeDoor();
      }
    }
    function updateDoorMode() {
      bdWrap.style.display = '';     // overlay available on all viewports (shown only while open)
      toInIframeDoor();             // boot: vault wears its in-iframe door
      placeDoor();
      syncDoor();
    }
    (function watchVault() {
      let tries = 0;
      const t = setInterval(() => {
        const w = pwin();
        let phone = null; try { phone = w && w.document.querySelector('.phone'); } catch (e) {}
        if (phone) {
          clearInterval(t);
          updateDoorMode();
          new MutationObserver(syncDoor).observe(phone, { attributes: true, attributeFilter: ['data-mode', 'data-room'] });
        } else if (++tries > 60) clearInterval(t);
      }, 100);
    })();

    // The vault starts CLOSED and EMPTY on every visit — no auto-open, and any persisted demo balance
    // is cleared behind the shut door — so the pointing finger's first tap on "add Taler" drops the
    // very first coin into an empty chamber and the "tap → it grows" mechanic reads clearly.
    // (Zufällig fills a rich pile on demand.)
    setTimeout(function () {
      let tries = 0;
      const poll = setInterval(() => {
        const w = pwin();
        let ready = false;
        try { ready = !!w && typeof w.setPreviewCoins === 'function' && w.document.readyState === 'complete'; } catch (e) {}
        if (ready) { clearInterval(poll); call('setPreviewCoins', 0); }
        else if (++tries > 45) clearInterval(poll);
      }, 160);
    }, 300);

    // Zufällig — REPLACE the vault with a fresh random mix (a demo of how a pile can look).
    function randomMix() {
      const rnd = (n) => Math.floor(Math.random() * (n + 1));
      const medals = Math.random() < 0.45 ? rnd(1) : 0;       // a Bitcoin medal now and then
      const barren = rnd(6), nugget = rnd(9), taler = rnd(9);
      let talerTotal = medals * 1000 + barren * 100 + nugget * 10 + taler;
      if (talerTotal === 0) talerTotal = 1 + rnd(8);           // never empty
      call('setPreviewCoins', talerTotal);                     // replaces (canonical respawn)
      const sats = rnd(7);
      for (let i = 0; i < sats; i++) call('addSatoshiPiece');  // a little loose change
    }

    // Add individual units. Maps to the canonical ladder (1 Taler = 100k sats).
    const ADD = { sat: () => call('addSatoshiPiece'), taler: () => call('buyCoins', 1), nugget: () => call('buyCoins', 10),
                  barren: () => call('buyCoins', 100), btc: () => call('buyCoins', 1000), black: () => call('buyCoins', 10000),
                  zufaellig: randomMix, reset: () => call('setPreviewCoins', 0) };
    document.querySelectorAll('.unit').forEach((b) => {
      b.addEventListener('click', () => {
        document.querySelector('.tap-finger')?.remove(); // the hint has done its job on the first tap
        b.classList.remove('flash'); void b.offsetWidth; b.classList.add('flash');
        call('openVault');
        (ADD[b.dataset.add] || (() => {}))();
      });
    });

    // ── Fit the phone ──
    //  Desktop (two-column): the phone fills the viewport height; the left column (text + rail)
    //  takes the rest of the width. Mobile (stacked): text on top, phone width-bound beside the rail.
    function fit() {
      const stage = document.querySelector('.stage');
      const cs = getComputedStyle(stage);
      const padT = parseFloat(cs.paddingTop) || 0, padB = parseFloat(cs.paddingBottom) || 0;
      const padL = parseFloat(cs.paddingLeft) || 0, padR = parseFloat(cs.paddingRight) || 0;
      const colGap = parseFloat(cs.columnGap) || 24;
      const rowGap = parseFloat(cs.rowGap) || 16;
      const railW = document.querySelector('.units').offsetWidth;
      const intro = document.querySelector('.intro');
      const introW = intro.offsetWidth, introH = intro.offsetHeight;
      const stacked = window.matchMedia('(max-width: 860px)').matches;
      let s;
      if (stacked) {
        const availW = window.innerWidth - padL - padR - railW - colGap;
        const availH = window.innerHeight - padT - padB - introH - rowGap;
        s = Math.min(availW / 419, availH / 878);
      } else {
        const availH = window.innerHeight - padT - padB;                          // phone fills height
        const leftW = Math.max(introW, railW);                                    // title over rail = one column
        const availW = window.innerWidth - padL - padR - leftW - colGap;
        s = Math.min(availH / 878, availW / 419);
      }
      if (!(s > 0)) return; // transient pre-layout measurement — skip
      s = Math.max(0.4, Math.min(s, 1.0));
      document.documentElement.style.setProperty('--s', s.toFixed(3));
      placeDoor(); // re-align the breakout overlay (geometry derives from --s + iframe rect); never
                   // re-run the door state machine here, or a resize while open would re-swing.
    }
    fit();
    requestAnimationFrame(fit);
    window.addEventListener('resize', fit);
    window.addEventListener('load', fit);
    frame.addEventListener('load', fit);
    [150, 450, 900].forEach((t) => setTimeout(fit, t)); // settle after layout + webfonts
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(fit);

    // ── Embers ──
    (function () {
      const motes = document.getElementById('motes');
      if (!motes || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      for (let i = 0; i < 7; i++) {
        const m = document.createElement('span');
        m.className = 'mote';
        m.style.left = ((i * 137) % 92 + 4) + '%';
        m.style.bottom = (8 + (i * 17) % 40) + '%';
        m.style.setProperty('--mx', ((i % 2 ? 1 : -1) * (10 + (i * 7) % 24)) + 'px');
        m.style.animationDuration = (12 + (i * 5) % 10) + 's';
        m.style.animationDelay = (i * 1.6) + 's';
        motes.appendChild(m);
      }
    })();
  </script>
